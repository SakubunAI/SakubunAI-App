<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koreksi Sakubun AI - Full Features</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap');
        :root { --bg: #f8f6f0; --panel: #ffffff; --text: #2c2a28; --accent: #c8923a; --border: rgba(0,0,0,0.1); }
        [data-theme="dark"] { --bg: #0f0e0c; --panel: #1a1917; --text: #f0e8d8; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; transition: 0.3s; }
        .jp-serif { font-family: 'Noto Serif JP', serif; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; }
        .btn-primary { background: var(--accent); color: #000; font-weight: 600; border-radius: 12px; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        .err-grammar { border-bottom: 2px solid #0055cc; background: rgba(0,85,204,0.1); }
        .loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body data-theme="dark">

    <header class="p-5 flex justify-between items-center border-b border-[var(--border)] sticky top-0 bg-[var(--bg)]/80 backdrop-blur-md z-40">
        <div class="flex items-center gap-2">
            <i class="ph ph-pen-nib text-[var(--accent)] text-2xl"></i>
            <h1 class="font-bold text-lg">Sakubun<span class="text-[var(--accent)]">AI</span></h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 bg-[var(--panel)] rounded-full border border-[var(--border)]">
            <i id="theme-icon" class="ph ph-moon"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto p-5 pb-24">
        <!-- Input Screen -->
        <div id="home-screen">
            <div class="mb-6">
                <h2 class="text-xl font-bold mb-1">Koreksi Teks Jepang</h2>
                <p class="text-sm opacity-60">Masukkan kalimat Anda di bawah ini.</p>
            </div>
            
            <textarea id="input-text" class="w-full panel p-4 h-64 focus:ring-1 ring-[var(--accent)] outline-none jp-serif text-lg mb-4" placeholder="例文：私わ日本語を勉強します。"></textarea>
            
            <button onclick="runKoreksi()" class="btn-primary w-full py-4 flex justify-center items-center gap-2">
                <i class="ph ph-sparkle"></i> Mulai Analisis
            </button>
        </div>

        <!-- Result Screen (Hidden by default) -->
        <div id="result-screen" class="hidden">
            <button onclick="showHome()" class="mb-4 text-sm opacity-60 flex items-center gap-1">
                <i class="ph ph-arrow-left"></i> Kembali
            </button>
            
            <div class="panel p-5 mb-4">
                <h3 class="text-xs font-bold opacity-50 uppercase mb-3 tracking-widest">Hasil Perbaikan</h3>
                <div id="text-output" class="jp-serif text-xl leading-relaxed text-[var(--accent)]"></div>
            </div>

            <div id="explanation-box" class="space-y-3">
                <!-- Penjelasan otomatis muncul disini -->
            </div>
        </div>
    </main>

    <div id="loading" class="loader flex-col gap-4">
        <div class="spinner"></div>
        <p class="font-medium">Menganalisis Bahasa...</p>
    </div>

    <script>
        const API_KEY = "AIzaSyDAPFD_Yjpvxy0WaA-DTiCRyPCphnFZ4Qo";
        const MODEL_NAME = "gemini-1.5-flash-latest"; // Menggunakan endpoint stabil

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isDark ? 'ph ph-sun' : 'ph ph-moon';
        }

        function showHome() {
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
        }

        async function runKoreksi() {
            const text = document.getElementById('input-text').value;
            if(!text) return;

            document.getElementById('loading').style.display = 'flex';

            // Endpoint v1 yang sudah diperbaiki
            const url = `https://generativelanguage.googleapis.com/v1/models/${MODEL_NAME}:generateContent?key=${API_KEY}`;
            
            const prompt = `Bertindaklah sebagai guru bahasa Jepang. Koreksi kalimat ini: "${text}". 
            Berikan hasil akhir yang benar saja di baris pertama, lalu berikan penjelasan singkat poin-poin kesalahannya (jika ada) dalam bahasa Indonesia.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const fullResult = data.candidates[0].content.parts[0].text;
                const lines = fullResult.split('\n');
                
                // Menampilkan baris pertama sebagai hasil koreksi teks
                document.getElementById('text-output').innerText = lines[0];
                
                // Menampilkan sisanya sebagai penjelasan
                const explanation = lines.slice(1).join('<br>');
                document.getElementById('explanation-box').innerHTML = `
                    <div class="panel p-4 text-sm leading-relaxed">
                        <h4 class="font-bold mb-2 flex items-center gap-2">
                            <i class="ph ph-info text-[var(--accent)]"></i> Penjelasan Guru:
                        </h4>
                        ${explanation || "Kalimat sudah bagus dan benar!"}
                    </div>
                `;

                document.getElementById('home-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
            } catch (err) {
                alert("Terjadi kesalahan: " + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
